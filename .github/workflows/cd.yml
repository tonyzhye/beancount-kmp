name: CD - Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 3.2.3)'
        required: true
        type: string

jobs:
  publish:
    runs-on: macos-latest  # macOS supports all KMP targets
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    
    - name: Decode signing key
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > signing-key.gpg
    
    - name: Publish to Maven Central
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signing.keyId: ${{ secrets.SIGNING_KEY_ID }}
        ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signing.secretKeyRingFile: signing-key.gpg
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          ./gradlew publishToMavenLocal -Pversion=${{ inputs.version }}
        else
          ./gradlew publishToMavenCentral
        fi
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        files: |
          **/build/distributions/*.zip
          **/build/distributions/*.tar

  publish-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: publish
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    
    - name: Build CLI distribution
      run: ./gradlew :cli:distZip :cli:distTar
    
    - name: Upload CLI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cli-${{ matrix.os }}
        path: |
          modules/cli/build/distributions/*.zip
          modules/cli/build/distributions/*.tar

  publish-native-image:
    name: Build Native Image (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: publish

    steps:
    - uses: actions/checkout@v4

    - name: Set up GraalVM JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'graalvm'

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Native Images
      run: ./gradlew :cli:nativeCompile :cli:nativeBeanqueryCompile --no-configuration-cache

    - name: Package Native Images
      shell: bash
      run: |
        mkdir -p native-release
        cp modules/cli/build/native/nativeCompile/beancount* native-release/ || true
        cp modules/cli/build/native/nativeBeanqueryCompile/beanquery* native-release/ || true
        cd native-release && zip -r "../beancount-native-${{ matrix.os }}.zip" .

    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: beancount-native-${{ matrix.os }}.zip
