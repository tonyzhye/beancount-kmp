name: CD - Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 3.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Verify coverage thresholds
        run: ./gradlew koverVerify

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python beancount
        run: |
          pip install beancount==3.2.3
          pip install beanquery

      - name: Run compatibility tests
        run: ./gradlew :loader:jvmTest --tests "*CompatTest" --tests "*CompatibilityVerificationTest"

  build-cli:
    name: Build CLI (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build CLI distribution
        run: ./gradlew :cli:distZip :cli:distTar

      - name: Rename CLI artifacts with OS suffix
        shell: bash
        run: |
          OS="${{ matrix.os }}"
          for f in modules/cli/build/distributions/*; do
            if [ -f "$f" ]; then
              base="${f##*/}"
              # Insert OS suffix before extension, e.g. beancount-cli-3.2.4-linux.zip
              if [[ "$base" =~ \. ]]; then
                ext="${base##*.}"
                name="${base%.*}"
                newname="${name}-${OS}.${ext}"
              else
                newname="${base}-${OS}"
              fi
              mv "$f" "modules/cli/build/distributions/${newname}"
            fi
          done

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: |
            modules/cli/build/distributions/*.zip
            modules/cli/build/distributions/*.tar

  build-native-image:
    name: Build Native Image (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up GraalVM JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Native Images
        run: ./gradlew :cli:nativeCompile :cli:nativeBeanqueryCompile --no-configuration-cache

      - name: Package Native Images
        shell: bash
        run: |
          mkdir -p native-release
          cp modules/cli/build/native/nativeCompile/beancount* native-release/ || true
          cp modules/cli/build/native/nativeBeanqueryCompile/beanquery* native-release/ || true
          OS="${{ matrix.os }}"
          cd native-release && zip -r "../beancount-native-${OS}.zip" .

      - name: Upload Native Image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: beancount-native-${{ matrix.os }}.zip

  publish-maven:
    name: Publish to Maven Central
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Decode signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > signing-key.gpg

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.keyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.secretKeyRingFile: signing-key.gpg
        run: |
          ./gradlew publishToMavenCentral -Pversion=${{ steps.version.outputs.version }}

  create-release:
    name: Create GitHub Release
    needs: [build-cli, build-native-image, publish-maven]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating release for version: $VERSION"

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: release-artifacts

      - name: Download Native Image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: release-artifacts

      - name: List release artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            release-artifacts/*

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          python3 - "$VERSION" "$DATE" << 'PYEOF'
          import sys
          version = sys.argv[1]
          today = sys.argv[2]
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          # Insert new version section after [Unreleased]
          content = content.replace(
              '## [Unreleased]',
              f'## [Unreleased]\n\n## [{version}] - {today}'
          )
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          PYEOF

      - name: Commit CHANGELOG update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG for v${{ steps.version.outputs.version }}"
          git push
