name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: [21]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-home-cache-cleanup: true
    
    - name: Run tests
      run: ./gradlew test
    
    - name: Generate coverage report
      run: ./gradlew koverHtmlReport
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}
        path: '**/build/reports/kover/html'
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: '**/build/reports/tests'

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build all modules
      run: ./gradlew build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/build/libs/*.jar
          **/build/distributions/*.zip

  coverage-check:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Verify coverage thresholds
      run: ./gradlew koverVerify
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: '**/build/reports/kover/report.xml'
        fail_ci_if_error: true

  compatibility-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python beancount
      run: pip install beancount==3.2.3
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Run compatibility tests
      run: ./gradlew :loader:jvmTest --tests "*CompatTest" --tests "*CompatibilityVerificationTest"

  native-image:
    name: Build Native Image (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up GraalVM JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'oracle-graalvm'

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Native Images
      run: ./gradlew :cli:nativeCompile :cli:nativeBeanqueryCompile --no-configuration-cache

    - name: Upload Native Image artifacts
      uses: actions/upload-artifact@v4
      with:
        name: native-image-${{ matrix.os }}
        path: |
          modules/cli/build/native/nativeCompile/*
          modules/cli/build/native/nativeBeanqueryCompile/*
